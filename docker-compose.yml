services:
  mysql-db:
    image: mysql:8.0
    container_name: grocery_mysql
    environment:
      MYSQL_ROOT_PASSWORD: tuankiet
      MYSQL_DATABASE: grocery_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - grocery_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend-api:
    build:
      context: ./Backend/grocery_app
      dockerfile: Dockerfile
    container_name: grocery_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/grocery_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=tuankiet
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - grocery_network

  frontend-web:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: grocery_frontend
    ports:
      - "80:80"
    depends_on:
      - backend-api
    networks:
      - grocery_network

networks:
  grocery_network:
    driver: bridge

volumes:
  mysql_data:
